<!DOCTYPE html>
<html>
<head>
  <title>Invoice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      color: #333;
    }

    .invoice-box {
      max-width: 800px;
      margin: auto;
      padding: 30px;
      border: 1px solid #eee;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      line-height: 1.6;
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .invoice-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .invoice-header div {
      width: 45%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th, table td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: left;
    }

    table th {
      background-color: #007bff;
      color: #fff;
    }

    table tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .total-row td {
      font-weight: bold;
      border-top: 2px solid #007bff;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 12px;
      color: #777;
    }

    @media print {
      button {
        display: none;
      }
      body {
        margin: 0;
      }
      .invoice-box {
        box-shadow: none;
        border: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>

<div class="invoice-box">
  <h1>Invoice</h1>

  <div class="invoice-header">
    <div>
      <strong>Customer:</strong>
      <p id="customerName"></p>
    </div>
    <div>
      <strong>Date:</strong>
      <p id="invoiceDate"></p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Product</th>
        <th>Unit Price</th>
        <th>Quantity</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="invoiceItemsTable">
      <!-- Filled dynamically -->
    </tbody>
    <tfoot>
      <tr class="total-row">
        <td colspan="3">Grand Total</td>
        <td id="grandTotal">$0.00</td>
      </tr>
    </tfoot>
  </table>

  <div style="text-align:center; margin-top:20px;">
    <button onclick="window.print()">Print Invoice</button>
  </div>

  <div class="footer">
    Inventory System | Generated automatically
  </div>
</div>

<script>
  // Sample invoice data
  const invoiceData = JSON.parse(localStorage.getItem('lastInvoice')) || {
    customer: 'John Doe',
    date: new Date().toLocaleString(),
    items: [
      { product: 'Product 1', price: 10.5, qty: 2 },
      { product: 'Product 2', price: 5, qty: 5 }
    ]
  };

  document.getElementById('customerName').textContent = invoiceData.customer;
  document.getElementById('invoiceDate').textContent = invoiceData.date;

  const invoiceItemsTable = document.getElementById('invoiceItemsTable');
  let grandTotal = 0;

  invoiceData.items.forEach(item => {
    const row = document.createElement('tr');
    const total = item.price * item.qty;
    grandTotal += total;
    row.innerHTML = `
      <td>${item.product}</td>
      <td>$${item.price.toFixed(2)}</td>
      <td>${item.qty}</td>
      <td>$${total.toFixed(2)}</td>
    `;
    invoiceItemsTable.appendChild(row);
  });

  document.getElementById('grandTotal').textContent = `$${grandTotal.toFixed(2)}`;
</script>

</body>
</html>
